theme = "tokyonight-ext"

[editor]
line-number = "relative"
mouse = true
preview-completion-insert = false
end-of-line-diagnostics = "hint"

[editor.session]
persist = true

[editor.inline-diagnostics]
cursor-line = "warning" # show warnings and errors on the cursorline inline

[editor.indent-guides]
render = true
skip-levels = 1

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.picker]
input-position = "bottom"

[editor.file-picker]
hidden = false


[keys.normal]
D = "@vgld"
C = "@vglc"
'^' = "@gs"
'$' = "@gl"
S-k = "hover"
C-h = "jump_view_left"
C-j = "jump_view_down"
C-k = "jump_view_up"
C-l = "jump_view_right"
C-e = "@9zj"
C-y = "@9zk"
C-d = "@5j"
C-u = "@5k"
C-s = ":write"          # Ctrl and 's' to write
C-v = [
  ":sh rm -f /tmp/unique-file-vsplit",
  ":insert-output yazi '%{buffer_name}' --chooser-file=/tmp/unique-file-vsplit",
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ":vsplit %sh{cat /tmp/unique-file-vsplit}",
  ":redraw",
]
C-x = [
  ":sh rm -f /tmp/unique-file-hsplit",
  ":insert-output yazi '%{buffer_name}' --chooser-file=/tmp/unique-file-hsplit",
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ":hsplit %sh{cat /tmp/unique-file-hsplit}",
  ":redraw",
]
X = "select_line_above"

[keys.insert.j]
j = "normal_mode"

[keys.insert]
C-s = ["normal_mode", ":write"]

[keys.normal.space]
Q = ":write-quit-all!"
e = "toggle_file_tree"
E = "toggle_file_tree"
g = ":sh tmux popup -d '#{pane_current_path}' -xC -yC -w80%% -h80%% -E lazygit"

[keys.normal.space.u]
h = ":toggle lsp.display-inlay-hints"

[keys.normal.space.S]
s = ":session-save"
r = ":session-restore"
l = ":session-list"
